apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-devops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hello-devops

  template:
    metadata:
      labels:
        app: hello-devops

    spec:
      containers:
      - name: hello-devops

        image: nguyenloidp/hello-devops:v1

        ports:
        - containerPort: 5000
