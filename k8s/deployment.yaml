apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-devops

spec:
  replicas: 20

  selector:
    matchLabels:
      app: hello-devops

  template:
    metadata:
      labels:
        app: hello-devops

    spec:
      containers:
      - name: hello-devops
        image: hello-devops:latest

        ports:
        - containerPort: 5000

        env:
        - name: APP_VERSION
          value: "v1"
