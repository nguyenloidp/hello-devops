name: Deploy To K8s

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show info
        run: |
          whoami
          kubectl get nodes

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment hello-devops
